services:
  microclaw:
    build:
      context: .
      dockerfile: Dockerfile
      target: all-in-one
    container_name: microclaw
    working_dir: /app
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      MICROCLAW_HOME: /app/.microclaw
      MICROCLAW_WEBUI_PATH: /app/webui
    volumes:
      - ./.microclaw:/app/.microclaw
    ports:
      - "${GATEWAY_PORT:-5080}:8080"
    restart: unless-stopped
