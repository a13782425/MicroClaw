# 情绪行为配置
# 情绪状态（警觉度/心情/好奇心/信心）会影响 LLM 推理参数和 System Prompt 后缀。
# 以下阈值决定当前情绪映射到哪种行为模式（判定优先级：谨慎 > 探索 > 休息 > 正常）。

emotion:

  # ── 模式切换阈值 ─────────────────────────────────────────────────
  # 警觉度 >= 此值 → 切换到「谨慎」模式（优先级最高）
  cautious_alertness_threshold: 70
  # 信心 <= 此值 → 切换到「谨慎」模式
  cautious_confidence_threshold: 30
  # 好奇心 >= 此值 且 心情 >= explore_min_mood → 切换到「探索」模式
  explore_min_curiosity: 70
  explore_min_mood: 60
  # 警觉度 <= 此值 且 心情 <= rest_max_mood → 切换到「休息」模式
  rest_max_alertness: 30
  rest_max_mood: 40

  # ── 正常模式（Normal）────────────────────────────────────────────
  normal_temperature: 0.7
  normal_top_p: 0.9
  normal_system_prompt_suffix: ""

  # ── 探索模式（Explore）───────────────────────────────────────────
  explore_temperature: 1.1
  explore_top_p: 0.95
  explore_system_prompt_suffix: "请大胆探索，鼓励创造性思维，给出多样化的想法。"

  # ── 谨慎模式（Cautious）──────────────────────────────────────────
  cautious_temperature: 0.3
  cautious_top_p: 0.8
  cautious_system_prompt_suffix: "请谨慎行事，仔细验证每一步，不确定时优先寻求确认而非猜测。"

  # ── 休息模式（Rest）──────────────────────────────────────────────
  rest_temperature: 0.5
  rest_top_p: 0.85
  rest_system_prompt_suffix: "请简明扼要地作答，避免过度展开。"
